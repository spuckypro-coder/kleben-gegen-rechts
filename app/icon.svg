<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hintergrund -->
  <rect width="32" height="32" rx="4" fill="#000"/>

  <!-- Linke Flagge (schwarz) - Stange links unten, Fahne rechts oben -->
  <line x1="7" y1="26" x2="15" y2="10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="15,10 7,13 11,18" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>

  <!-- Rechte Flagge (rot) - Stange rechts unten, Fahne links oben -->
  <line x1="25" y1="26" x2="17" y2="10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="17,10 25,13 21,18" fill="#cc0000" stroke="#ff0000" stroke-width="0.5"/>

  <!-- Kreuzungspunkt Highlight -->
  <circle cx="16" cy="18.5" r="1.2" fill="#ffcc00"/>
</svg>
